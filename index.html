<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Para Jess</title>
  <style>
    :root{
      --green-a:#8bcf58;
      --green-b:#5b9633;
      --green-c:#2e5519;

      --yellow-a:#fff6b0;
      --yellow-b:#ffe167;
      --yellow-c:#ffc91f;
      --yellow-d:#e39c00;

      --brown-a:#a56c2e;
      --brown-b:#72401a;
      --brown-c:#351a08;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html,body{
      width:100%;
      height:100%;
      overflow:hidden;
      background:#000;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .scene{
      position:relative;
      width:min(100vw, calc(100vh * 0.56));
      height:100vh;
      overflow:hidden;
      background:
        radial-gradient(ellipse at 50% 20%, rgba(0,90,180,.35) 0%, rgba(0,45,90,.18) 24%, rgba(0,0,0,0) 56%),
        linear-gradient(180deg, #01040a 0%, #000 45%, #000 100%);
      isolation:isolate;
    }

    .scene::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(ellipse at 50% 22%, rgba(20,110,210,.30) 0%, rgba(8,50,110,.14) 28%, transparent 62%);
      z-index:0;
      pointer-events:none;
    }

    .scene::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(90deg,
          rgba(0,0,0,.92) 0%,
          rgba(0,0,0,.45) 10%,
          rgba(0,0,0,0) 22%,
          rgba(0,0,0,0) 78%,
          rgba(0,0,0,.45) 90%,
          rgba(0,0,0,.92) 100%);
      z-index:5;
      pointer-events:none;
    }

    .sky{
      position:absolute;
      inset:0;
      z-index:1;
      pointer-events:none;
    }

    .art{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      z-index:3;
      pointer-events:none;
      overflow:visible;
    }

    .message{
      position:absolute;
      top:12%;
      left:50%;
      transform:translateX(-50%);
      z-index:4;
      width:88%;
      text-align:center;
      pointer-events:none;
    }

    .message-text{
      color: #fff2b5;
      font-weight: 600;
      font-size: clamp(1.2rem, 3.5vw, 2.1rem);
      letter-spacing: 0.5px;
      line-height: 1.2;
      text-transform: none;
      text-shadow:
        0 0 6px #ffdd88,
        0 0 12px #ffcc66,
        0 0 20px #ffbb44,
        0 0 30px rgba(255, 180, 70, 0.6),
        0 2px 4px rgba(0, 0, 0, 0.3);
      animation: textGlow 2.5s ease-in-out infinite alternate, textFadeSoft 1.8s ease-in-out;
      white-space: pre-line;
    }

    @keyframes textGlow {
      0% {
        text-shadow:
          0 0 4px #ffdd99,
          0 0 8px #ffcc77,
          0 0 15px #ffaa44,
          0 0 25px rgba(255, 170, 68, 0.5);
      }
      100% {
        text-shadow:
          0 0 10px #fff0b5,
          0 0 18px #ffdd88,
          0 0 28px #ffcc66,
          0 0 40px rgba(255, 200, 100, 0.8);
      }
    }

    @keyframes textFadeSoft {
      0% {
        opacity: 0;
        transform: translateY(8px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .star{
      position:absolute;
      border-radius:50%;
      background:#fff;
      box-shadow:
        0 0 3px rgba(255,255,255,.95),
        0 0 10px rgba(255,255,255,.30);
      animation:twinkle ease-in-out infinite alternate;
      will-change:opacity, transform;
    }

    @keyframes twinkle{
      0%{ opacity:.12; transform:scale(.88); }
      100%{ opacity:1; transform:scale(1.12); }
    }

    .shooting-star{
      position:absolute;
      width:150px;
      height:2px;
      opacity:0;
      background:linear-gradient(
        90deg,
        rgba(255,255,255,.98) 0%,
        rgba(255,255,255,.84) 24%,
        rgba(255,255,255,.18) 65%,
        rgba(255,255,255,0) 100%
      );
      filter:drop-shadow(0 0 8px rgba(255,255,255,.9));
      transform:translate3d(0,0,0) rotate(135deg);
      animation:shoot linear infinite;
      will-change:transform, opacity;
    }

    .shooting-star::after{
      content:"";
      position:absolute;
      right:-2px;
      top:-3px;
      width:8px;
      height:8px;
      border-radius:50%;
      background:#fff;
      box-shadow:
        0 0 8px rgba(255,255,255,1),
        0 0 18px rgba(255,255,255,.5);
    }

    @keyframes shoot{
      0%,78%{
        opacity:0;
        transform:translate3d(0,0,0) rotate(135deg);
      }
      82%{
        opacity:1;
      }
      100%{
        opacity:0;
        transform:translate3d(-240px,240px,0) rotate(135deg);
      }
    }

    .stem-grow{
      transform-box:fill-box;
      transform-origin:center bottom;
      transform:scaleY(0);
      animation:growStem 2.15s cubic-bezier(.22,.8,.2,1) forwards;
      animation-delay:var(--stem-delay);
    }

    @keyframes growStem{
      to{ transform:scaleY(1); }
    }

    .leaf-pop{
      opacity:0;
      transform-box:fill-box;
      transform-origin:center center;
      animation:leafIn .75s ease-out forwards;
      animation-delay:var(--leaf-delay);
    }

    @keyframes leafIn{
      0%{
        opacity:0;
        transform:scale(.25) translateY(8px);
      }
      100%{
        opacity:1;
        transform:scale(1) translateY(0);
      }
    }

    .bloom{
      opacity:0;
      transform-box:fill-box;
      transform-origin:center center;
      animation:bloomIn 1.2s cubic-bezier(.18,.86,.22,1) forwards;
      animation-delay:var(--bloom-delay);
    }

    @keyframes bloomIn{
      0%{
        opacity:0;
        transform:translateY(14px) scale(.18);
      }
      70%{
        opacity:1;
        transform:translateY(0) scale(1.08);
      }
      100%{
        opacity:1;
        transform:translateY(0) scale(1);
      }
    }

    .sway{
      transform-box:fill-box;
      transform-origin:center 68%;
      animation:sway 5.8s ease-in-out infinite;
      animation-delay:calc(var(--bloom-delay) + .25s);
    }

    @keyframes sway{
      0%,100%{ transform:rotate(-2deg); }
      50%{ transform:rotate(2deg); }
    }

    .float-leaf{
      transform-box:fill-box;
      transform-origin:center center;
      animation:floatLeaf 7s ease-in-out infinite;
    }

    @keyframes floatLeaf{
      0%,100%{ transform:translateY(0); }
      50%{ transform:translateY(-6px); }
    }

    @media (max-width:700px){
      .scene{
        width:100vw;
        height:100vh;
      }

      .message{
        top:13%;
        width:90%;
      }

      .message-text{
        font-size:clamp(1rem, 4vw, 1.8rem);
      }
    }
  </style>
</head>
<body>

  <script>
    const sky = document.getElementById("sky");

    const stars = document.createDocumentFragment();
    for (let i = 0; i < 58; i++) {
      const star = document.createElement("span");
      star.className = "star";

      const size = (Math.random() * 2 + 0.7).toFixed(2);
      star.style.width = size + "px";
      star.style.height = size + "px";
      star.style.left = (Math.random() * 100) + "%";
      star.style.top = (Math.random() * 92) + "%";
      star.style.opacity = (0.15 + Math.random() * 0.7).toFixed(2);
      star.style.animationDuration = (5.5 + Math.random() * 6.5) + "s";
      star.style.animationDelay = (-Math.random() * 10) + "s";

      stars.appendChild(star);
    }
    sky.appendChild(stars);

    const meteors = [
      { left: "83%", top: "16%", dur: 9.5, delay: 2.5 },
      { left: "76%", top: "28%", dur: 10.2, delay: 8.8 }
    ];

    meteors.forEach(m => {
      const s = document.createElement("span");
      s.className = "shooting-star";
      s.style.left = m.left;
      s.style.top = m.top;
      s.style.animationDuration = m.dur + "s";
      s.style.animationDelay = m.delay + "s";
      sky.appendChild(s);
    });

    const frases = [
      "Jessii",
      "Feliz 21 Un poco tarde, pero mejor que nunca ✨",
      "Me tomó unas horas hacerlas ⏳",
      "Así que si no te gustan...",
      "voy a necesitar que me mientas y digas que sí",
      "Te quiero gordita 💛"
    ];

    let index = 0;
    const messageElement = document.querySelector('.message-text');

    function cambiarFrase() {
      if (messageElement) {
        messageElement.style.opacity = '0';
        messageElement.style.transform = 'translateY(8px)';

        setTimeout(() => {
          messageElement.textContent = frases[index];
          messageElement.style.opacity = '';
          messageElement.style.transform = '';
          index = (index + 1) % frases.length;
        }, 400);
      }
    }

    setInterval(cambiarFrase, 3000);

    if (messageElement) {
